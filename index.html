<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>CR · ENTER Station</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1 { color:#6cf; }
button {
    background:#6cf;
    color:#000;
    padding:12px 20px;
    border:none;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}
button:hover { background:#9df; }
pre { background:#111; border:1px solid #333; padding:12px; }
</style>
</head>

<body>

<h1>CR · ENTER Station</h1>

<pre>
CORE        = CR
VERSION     = 1.0
STATE       = rdy
LEVEL       = gruen
READY       = ENTER
</pre>

<button onclick="CR_ENTER()">ENTER</button>

<script>
// --- CR ENTER TRIGGER ---
function CR_ENTER(){
    console.log("CR ENTER ausgelöst");

    CR_TO_UP();
    CR_TO_IN();
    CR_TO_IX();
    CR_TO_XI();
    CR_TO_XROOM();
    CR_TO_OUT();
}

// --- Trigger-Funktionen ---
function CR_TO_UP(){ console.log("CR → UP"); }
function CR_TO_IN(){ console.log("CR → IN"); }
function CR_TO_IX(){ console.log("CR → IX"); }
function CR_TO_XI(){ console.log("CR → XI"); }
function CR_TO_XROOM(){ console.log("CR → X.room"); }
function CR_TO_OUT(){ console.log("CR → OUT"); }
</script>

</body>
</html>
