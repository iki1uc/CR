<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>CR · ENTER Station</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
h1 { color:#6cf; }
pre { background:#111; border:1px solid #333; padding:12px; }
button {
    background:#6cf;
    color:#000;
    padding:12px 20px;
    border:none;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}
button:hover { background:#9df; }
</style>
</head>

<body>

<h1>CR · ENTER Station</h1>

<pre id="cr_out">
CORE        = CR
VERSION     = 1.0
STATE       = rdy
LEVEL       = gruen
READY       = ENTER
</pre>

<button onclick="CR_ENTER()">ENTER</button>

<script>
// --- CR ENTER TRIGGER ---
function CR_ENTER(){
    console.log("CR ENTER ausgelöst");
}

// --- CR FILE LIST ---
const CR_FILES = [
    "HELP.me",
    "X.room.CORE",
    "X.room.IN",
    "X.room.OUT"
];

// --- CR-SCAN ---
async function CR_SCAN(){
    const out = { rot:[], gelb:[], gruen:[] };

    for(const f of CR_FILES){
        try {
            const res = await fetch(`./${f}`);
            if(!res.ok){
                out.rot.push(f);
                continue;
            }

            const txt = await res.text();
            if(txt.trim().length === 0){
                out.gelb.push(f);
            } else {
                out.gruen.push(f);
            }

        } catch(e){
            out.rot.push(f);
        }
    }

    return out;
}

// --- START ---
(async () => {
    const scan = await CR_SCAN();
    const out = document.getElementById("cr_out");

    out.innerHTML += "\nROT   = " + JSON.stringify(scan.rot);
    out.innerHTML += "\nGELB  = " + JSON.stringify(scan.gelb);
    out.innerHTML += "\nGRUEN = " + JSON.stringify(scan.gruen);
})();
</script>

</body>
</html>
